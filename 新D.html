<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Duel Ultimate</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:black;
}

/* =========================
背景
========================= */

.background{
    position:fixed;
    inset:0;
    background:black;
    z-index:-1;
}

/* =========================
全体
========================= */

#game{
    width:100%;
    height:100%;
    padding:15px;
}

.turn-title{
    width:100%;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    color:#00e5ff;
    text-shadow:0 0 10px #00e5ff;
}

/* =========================
配置ターン
========================= */

.deploy-layout{
    width:100%;
    height:calc(100% - 60px);

    display:grid;
    grid-template-columns: 35% 65%;
}

/* =========================
左側
========================= */

.left-side{
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    padding-bottom:20px;
}

.player-image{
    width:320px;
    height:420px;
    border:3px solid white;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,0.05);
    font-size:30px;
}

.enemy-image{
    width:140px;
    height:180px;
    border:3px solid white;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,0.05);
    font-size:18px;
}

.flip{
    transform:scaleX(-1);
}

.hp-area{
    margin-top:20px;
    width:90%;
}

.hp-bar{
    width:100%;
    height:40px;
    border:3px solid white;
    position:relative;
    background:#222;
}

.hp-fill{
    height:100%;
    background:#2cff55;
    transition:0.4s;
}

.hp-text{
    margin-top:10px;
    font-size:42px;
    text-align:right;
}

/* =========================
右側
========================= */

.right-side{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.top-info{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

.dice-panel{
    width:260px;
    height:360px;
    border:3px solid white;
    padding:15px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.dice-box{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.dice{
    width:90px;
    height:120px;
    border:2px solid white;
    background:white;
    color:black;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:60px;
    cursor:pointer;
}

.selected-dice{
    border:5px solid gold;
}

.role-text{
    margin-top:25px;
    font-size:24px;
    color:#7cff00;
    text-align:center;
}

.damage-text{
    margin-top:20px;
    font-size:26px;
    color:#ff6b6b;
    text-align:center;
}

.cards-panel{
    width:450px;
    height:360px;
    border:3px solid white;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    padding:10px;
}

.card{
    width:200px;
    height:320px;
    border:3px solid white;
    background:#2b2b2b;
    cursor:pointer;
    transition:0.2s;
    padding:10px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:scale(1.03);
}

.selected-card{
    border:5px solid gold;
    box-shadow:0 0 15px gold;
}

.card-name{
    text-align:center;
    font-size:22px;
    color:gold;
}

.card-image{
    width:100%;
    height:130px;
    border:2px solid white;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card-desc{
    font-size:16px;
    line-height:1.4;
}

/* =========================
ボタン
========================= */

.button-area{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.main-btn{
    min-width:260px;
    min-height:90px;
    padding:15px 25px;

    border:none;
    cursor:pointer;

    background:#ff9800;
    color:white;

    font-size:28px;
    border-radius:20px;

    transition:0.2s;
}

.main-btn:hover{
    transform:scale(1.05);
}

.disabled{
    opacity:0.4;
    pointer-events:none;
}

/* =========================
敵
========================= */

.enemy-area{
    width:100%;
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    gap:20px;
    padding-right:40px;
}

/* =========================
実行ターン
========================= */

.duel-layout{
    width:100%;
    height:calc(100% - 60px);

    display:grid;
    grid-template-columns:1fr 260px 1fr;
    align-items:center;
}

.duel-player{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:20px;
}

.duel-top{
    display:flex;
    gap:20px;
    justify-content:center;
}

.single-card{
    width:240px;
    height:340px;
    border:3px solid white;
    background:#2b2b2b;
    padding:10px;
}

.duel-middle{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.duel-character{
    width:250px;
    height:320px;
    border:3px solid white;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,0.05);
}

.duel-center{
    display:flex;
    justify-content:center;
    align-items:center;
}

.duel-btn{
    width:220px;
    height:220px;

    border:none;
    cursor:pointer;

    background:#ff0033;
    color:white;

    font-size:38px;
    font-weight:bold;

    clip-path:polygon(
    50% 0%,
    61% 20%,
    82% 18%,
    73% 38%,
    100% 50%,
    73% 62%,
    82% 82%,
    61% 80%,
    50% 100%,
    39% 80%,
    18% 82%,
    27% 62%,
    0% 50%,
    27% 38%,
    18% 18%,
    39% 20%
    );

    transition:0.2s;
}

.duel-btn:hover{
    transform:scale(1.08);
}

.win-text{
    font-size:42px;
    text-align:center;
    color:gold;
    text-shadow:0 0 15px gold;
    margin-top:20px;
}

.hidden{
    display:none !important;
}

</style>
</head>

<body>

<div class="background"></div>

<div id="game">

<div id="turnTitle" class="turn-title">
Docter Deployment turn-配置ターン
</div>

<!-- =========================
配置ターン
========================= -->

<div id="deployScreen" class="deploy-layout">

    <!-- 左 -->
    <div class="left-side">

        <div id="mainCharacter" class="player-image">
            Player Image
        </div>

        <div class="hp-area">

            <div class="hp-bar">
                <div id="mainHpFill" class="hp-fill"></div>
            </div>

            <div id="mainHpText" class="hp-text">
                50 / 50
            </div>

        </div>

    </div>

    <!-- 右 -->
    <div class="right-side">

        <div class="top-info">

            <!-- サイコロ -->
            <div class="dice-panel">

                <div class="dice-box">

                    <div id="dice1" class="dice">?</div>

                    <div id="dice2" class="dice">?</div>

                </div>

                <div id="roleText" class="role-text"></div>

                <div id="damageText" class="damage-text">
                    Deduction Damage-予測ダメージ :
                </div>

            </div>

            <!-- カード -->
            <div class="cards-panel">

                <div id="card1" class="card hidden"></div>

                <div id="card2" class="card hidden"></div>

            </div>

        </div>

        <!-- ボタン -->
        <div class="button-area" id="buttonArea">

            <button
            id="mainBtn"
            class="main-btn"
            onclick="rollDice()">
            Double Dice roll
            </button>

        </div>

        <!-- 敵 -->
        <div class="enemy-area">

            <div class="enemy-image flip">
                Enemy
            </div>

            <div style="width:260px;">

                <div class="hp-bar">
                    <div id="enemyHpFill" class="hp-fill"></div>
                </div>

                <div id="enemyHpText"
                class="hp-text"
                style="font-size:30px;">
                50 / 50
                </div>

            </div>

        </div>

    </div>

</div>

<!-- =========================
実行ターン
========================= -->

<div id="duelScreen" class="duel-layout hidden">

    <!-- 左 -->
    <div class="duel-player">

        <div class="duel-top">

            <div class="dice-panel">

                <div class="dice-box">

                    <div class="dice" id="duelP1Dice1">?</div>
                    <div class="dice" id="duelP1Dice2">?</div>

                </div>

                <div id="duelP1Role" class="role-text"></div>

                <div id="duelP1Damage"
                class="damage-text"></div>

            </div>

            <div id="duelP1Card"
            class="single-card"></div>

        </div>

        <div class="duel-middle">

            <div class="duel-character">
                Docter
            </div>

            <div style="width:300px;">

                <div class="hp-bar">
                    <div id="duelP1HpFill"
                    class="hp-fill"></div>
                </div>

                <div id="duelP1HpText"
                class="hp-text">
                50 / 50
                </div>

            </div>

        </div>

    </div>

    <!-- 中央 -->
    <div class="duel-center">

        <button id="duelBtn"
        class="duel-btn"
        onclick="startDuel()">
        Duel
        </button>

    </div>

    <!-- 右 -->
    <div class="duel-player">

        <div class="duel-top">

            <div class="dice-panel">

                <div class="dice-box">

                    <div class="dice" id="duelP2Dice1">?</div>
                    <div class="dice" id="duelP2Dice2">?</div>

                </div>

                <div id="duelP2Role"
                class="role-text"></div>

                <div id="duelP2Damage"
                class="damage-text"></div>

            </div>

            <div id="duelP2Card"
            class="single-card"></div>

        </div>

        <div class="duel-middle">

            <div class="duel-character flip">
                Dragon
            </div>

            <div style="width:300px;">

                <div class="hp-bar">
                    <div id="duelP2HpFill"
                    class="hp-fill"></div>
                </div>

                <div id="duelP2HpText"
                class="hp-text">
                50 / 50
                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script>

/* =========================
カード
========================= */

const fullDeck = [

{
name:"Disposal-廃棄",
timing:0,
description:"ターン終了時、片方のさいころを選んで振りなおす。"
},

{
name:"Dozen-ダース",
timing:1,
description:"ダメージ値を12に固定する。"
},

{
name:"Doping-ドーピング",
timing:1,
description:"ダメージ値を+3する。"
},

{
name:"Desperate-必死",
timing:1,
description:"相手HP-自分HPの差をダメージに追加する。"
},

{
name:"Decay-腐敗",
timing:1,
description:"ダメージ値を-15する。"
},

{
name:"Decline-減少",
timing:1,
description:"ダメージ値を-10する。"
},

{
name:"Duty-義務",
timing:1,
description:"ダメージ値が6以上なら5にする。"
},

{
name:"Dull-退屈",
timing:1,
description:"役が成立していない場合ダメージ値を0にする。"
},

{
name:"Debt-借金",
timing:1,
description:"今回のダメージ+5。次ターンのダメージ-10。"
},

{
name:"Dynamic-ダイナミック",
timing:2,
description:"お互いのダメージ値を2倍にする。"
},

{
name:"Declare-宣言",
timing:2,
description:"50%でダメージ2倍、50%で0になる。"
},

{
name:"Dinamite-ダイナマイト",
timing:3,
description:"使用者が10ダメージ受ける。"
},

{
name:"Drop out-降参",
timing:3,
description:"使用者が即敗北する。"
},

{
name:"Disastar-災害",
timing:3,
description:"お互いに10ダメージ。"
},

{
name:"Defence-防御",
timing:4,
description:"受けるダメージを 相手ダメージ-自分ダメージ にする。"
},

{
name:"Dodge-回避",
timing:4,
description:"50%で受けるダメージを0にする。"
},

{
name:"Dictator-独裁者",
timing:4,
description:"相手ダメージが高い場合受けるダメージを0にする。"
},

{
name:"Defeat-欠陥",
timing:4,
description:"受けるダメージを2倍にする。"
},

{
name:"Defiance-反抗",
timing:5,
description:"多く受けたダメージ分を相手へ返す。"
},

{
name:"Dizzy-めまい",
timing:5,
description:"次ターン引くカード表示が???になる。"
}

];

let deck = [...fullDeck];

/* =========================
プレイヤー
========================= */

function createPlayer(name){

    return{

        name:name,

        hp:50,

        dice1:0,
        dice2:0,
        extra:0,

        damage:0,

        role:"",

        cards:[],

        selectedCard:null,

        debt:0,

        dizzy:false,

        disposalMode:false,

        rerollTarget:null,

        receivedDamage:0
    };
}

let p1 = createPlayer("Docter");
let p2 = createPlayer("Dragon");

let currentTurn = 1;

/* =========================
基本
========================= */

function randomDice(){
    return Math.floor(Math.random()*6)+1;
}

function getPlayer(){
    return currentTurn === 1 ? p1 : p2;
}

function getEnemy(){
    return currentTurn === 1 ? p2 : p1;
}

/* =========================
更新
========================= */

function updateUI(){

    let player = getPlayer();
    let enemy = getEnemy();

    document.getElementById("turnTitle")
    .innerHTML =
    `${player.name} Deployment turn-配置ターン`;

    /* HP */

    let playerHpPercent =
    (player.hp / 50) * 100;

    let enemyHpPercent =
    (enemy.hp / 50) * 100;

    document.getElementById("mainHpFill")
    .style.width =
    playerHpPercent + "%";

    document.getElementById("enemyHpFill")
    .style.width =
    enemyHpPercent + "%";

    document.getElementById("mainHpText")
    .innerHTML =
    `${player.hp} / 50`;

    document.getElementById("enemyHpText")
    .innerHTML =
    `${enemy.hp} / 50`;

    /* サイコロ */

    document.getElementById("dice1")
    .innerHTML =
    player.dice1 || "?";

    document.getElementById("dice2")
    .innerHTML =
    player.dice2 || "?";

    document.getElementById("roleText")
    .innerHTML =
    player.role;

    document.getElementById("damageText")
    .innerHTML =
    `Deduction Damage-予測ダメージ : ${player.damage}`;
}

/* =========================
ダメージ計算
========================= */

function calculateDamage(player){

    let d1 = player.dice1;
    let d2 = player.dice2;

    player.role = "";

    player.extra = 0;

    let damage = d1 + d2;

    if(d1 === 1 && d2 === 1){

        player.role =
        "Dog Dividend-わんわんボーナス";

        player.extra = randomDice();

        damage =
        (d1 + d2) * player.extra;
    }

    else if(d1 % 2 === 1 &&
    d2 % 2 === 1){

        player.role =
        "odd Dividend-奇数ボーナス";

        damage = d1 * d2;
    }

    else if(d1 % 2 === 0 &&
    d2 % 2 === 0){

        player.role =
        "even Dividend-偶数ボーナス";

        damage = (d1 + d2) * 2;
    }

    damage += player.debt;

    player.debt = 0;

    if(damage < 0){
        damage = 0;
    }

    player.damage = damage;
}

/* =========================
サイコロ
========================= */

function rollDice(){

    let player = getPlayer();

    player.dice1 = randomDice();
    player.dice2 = randomDice();

    calculateDamage(player);

    updateUI();

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button class="main-btn"
    onclick="drawCards()">
    Dual Draw-２枚ドロー
    </button>

    <button class="main-btn"
    onclick="skipDraw()">
    Draw skip-ドロースキップ
    </button>
    `;
}

/* =========================
カード
========================= */

function drawCards(){

    let player = getPlayer();

    player.cards = [];

    if(deck.length < 2){
        deck = [...fullDeck];
    }

    for(let i=0;i<2;i++){

        let index =
        Math.floor(Math.random()*deck.length);

        player.cards.push(deck[index]);

        deck.splice(index,1);
    }

    renderCards(player);

    renderDoneButton(false);
}

function renderCards(player){

    const cardDivs = [
        document.getElementById("card1"),
        document.getElementById("card2")
    ];

    player.cards.forEach((card,index)=>{

        let div = cardDivs[index];

        div.classList.remove("hidden");

        let title =
        player.dizzy ? "???" : card.name;

        let desc =
        player.dizzy ? "???" : card.description;

        div.innerHTML =

        `
        <div class="card-name">
        ${title}
        </div>

        <div class="card-image">
        IMAGE
        </div>

        <div class="card-desc">
        ${desc}
        </div>
        `;

        div.onclick = ()=>{

            player.selectedCard = card;

            document.querySelectorAll(".card")
            .forEach(c=>
            c.classList.remove("selected-card"));

            div.classList.add("selected-card");

            renderDoneButton(true);
        };
    });

    player.dizzy = false;
}

function renderDoneButton(enable){

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button
    id="doneButton"
    class="main-btn ${enable ? "" : "disabled"}"
    onclick="nextTurn()">
    Done turn-ターン終了
    </button>
    `;
}

function skipDraw(){

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button
    class="main-btn"
    onclick="nextTurn()">
    Done turn-ターン終了
    </button>
    `;
}

/* =========================
廃棄
========================= */

function startRerollMode(player){

    player.disposalMode = true;

    document.getElementById("dice1")
    .onclick = ()=>{

        player.rerollTarget = 1;

        selectDice(1);
    };

    document.getElementById("dice2")
    .onclick = ()=>{

        player.rerollTarget = 2;

        selectDice(2);
    };

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button
    id="rerollBtn"
    class="main-btn disabled"
    onclick="rerollDice()">
    Reroll
    </button>
    `;
}

function selectDice(num){

    document.getElementById("dice1")
    .classList.remove("selected-dice");

    document.getElementById("dice2")
    .classList.remove("selected-dice");

    document.getElementById(
    `dice${num}`
    ).classList.add("selected-dice");

    document.getElementById("rerollBtn")
    .classList.remove("disabled");
}

function rerollDice(){

    let player = getPlayer();

    if(player.rerollTarget === 1){

        player.dice1 = randomDice();
    }

    else{

        player.dice2 = randomDice();
    }

    calculateDamage(player);

    updateUI();

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button
    class="main-btn"
    onclick="finishTurnAfterReroll()">
    Done turn-ターン終了
    </button>
    `;
}

function finishTurnAfterReroll(){

    let player = getPlayer();

    player.disposalMode = false;

    player.rerollTarget = null;

    nextTurn(true);
}

/* =========================
ターン終了
========================= */

function nextTurn(fromReroll=false){

    let player = getPlayer();

    if(
        player.selectedCard &&
        player.selectedCard.name.includes("Disposal") &&
        !player.disposalMode &&
        !fromReroll
    ){

        startRerollMode(player);

        return;
    }

    applyTiming1(
    player,
    getEnemy()
    );

    if(currentTurn === 1){

        currentTurn = 2;

        resetDeployUI();

        updateUI();

        return;
    }

    startDuelScreen();
}

function resetDeployUI(){

    document.getElementById("card1")
    .classList.add("hidden");

    document.getElementById("card2")
    .classList.add("hidden");

    document.getElementById("card1")
    .classList.remove("selected-card");

    document.getElementById("card2")
    .classList.remove("selected-card");

    document.getElementById("buttonArea")
    .innerHTML =

    `
    <button
    class="main-btn"
    onclick="rollDice()">
    Double Dice roll
    </button>
    `;
}

/* =========================
カード効果
========================= */

function applyTiming1(player,enemy){

    if(!player.selectedCard) return;

    let card =
    player.selectedCard.name;

    if(card.includes("Dozen")){
        player.damage = 12;
    }

    if(card.includes("Doping")){
        player.damage += 3;
    }

    if(card.includes("Desperate")){

        let add =
        enemy.hp - player.hp;

        if(add < 0){
            add = 0;
        }

        player.damage += add;
    }

    if(card.includes("Decay")){
        player.damage -= 15;
    }

    if(card.includes("Decline")){
        player.damage -= 10;
    }

    if(card.includes("Duty")){

        if(player.damage >= 6){
            player.damage = 5;
        }
    }

    if(card.includes("Dull")){

        if(player.role === ""){
            player.damage = 0;
        }
    }

    if(card.includes("Debt")){

        player.damage += 5;

        player.debt = -10;
    }

    if(player.damage < 0){
        player.damage = 0;
    }
}

function applyTiming2(){

    [p1,p2].forEach(player=>{

        if(!player.selectedCard) return;

        let card =
        player.selectedCard.name;

        if(card.includes("Dynamic")){

            p1.damage *= 2;
            p2.damage *= 2;
        }

        if(card.includes("Declare")){

            if(Math.random() < 0.5){
                player.damage *= 2;
            }
            else{
                player.damage = 0;
            }
        }
    });
}

function applyTiming3(){

    [p1,p2].forEach(player=>{

        if(!player.selectedCard) return;

        let card =
        player.selectedCard.name;

        if(card.includes("Dinamite")){
            player.hp -= 10;
        }

        if(card.includes("Drop out")){
            player.hp = 0;
        }

        if(card.includes("Disastar")){

            p1.hp -= 10;
            p2.hp -= 10;
        }
    });
}

function applyTiming4(){

    p1.receivedDamage = p2.damage;
    p2.receivedDamage = p1.damage;

    [p1,p2].forEach((player,index)=>{

        let enemy =
        index === 0 ? p2 : p1;

        if(!player.selectedCard) return;

        let card =
        player.selectedCard.name;

        if(card.includes("Defence")){

            player.receivedDamage =
            enemy.damage - player.damage;

            if(player.receivedDamage < 0){
                player.receivedDamage = 0;
            }
        }

        if(card.includes("Dodge")){

            if(Math.random() < 0.5){
                player.receivedDamage = 0;
            }
        }

        if(card.includes("Dictator")){

            if(enemy.damage > player.damage){
                player.receivedDamage = 0;
            }
        }

        if(card.includes("Defeat")){
            player.receivedDamage *= 2;
        }
    });
}

function applyTiming5(){

    [p1,p2].forEach((player,index)=>{

        let enemy =
        index === 0 ? p2 : p1;

        if(!player.selectedCard) return;

        let card =
        player.selectedCard.name;

        if(card.includes("Defiance")){

            let diff =
            player.receivedDamage -
            enemy.receivedDamage;

            if(diff > 0){
                enemy.hp -= diff;
            }
        }

        if(card.includes("Dizzy")){

            player.dizzy = true;
        }
    });
}

/* =========================
実行ターン
========================= */

function startDuelScreen(){

    document.getElementById("deployScreen")
    .classList.add("hidden");

    document.getElementById("duelScreen")
    .classList.remove("hidden");

    document.getElementById("turnTitle")
    .innerHTML =
    "Duel turn";

    renderDuelInfo();
}

function renderDuelInfo(){

    document.getElementById("duelP1Dice1")
    .innerHTML = p1.dice1;

    document.getElementById("duelP1Dice2")
    .innerHTML = p1.dice2;

    document.getElementById("duelP1Role")
    .innerHTML = p1.role;

    document.getElementById("duelP1Damage")
    .innerHTML =
    `Deduction Damage-予測ダメージ : ${p1.damage}`;

    document.getElementById("duelP2Dice1")
    .innerHTML = p2.dice1;

    document.getElementById("duelP2Dice2")
    .innerHTML = p2.dice2;

    document.getElementById("duelP2Role")
    .innerHTML = p2.role;

    document.getElementById("duelP2Damage")
    .innerHTML =
    `Deduction Damage-予測ダメージ : ${p2.damage}`;

    renderSingleCard(
    "duelP1Card",
    p1.selectedCard
    );

    renderSingleCard(
    "duelP2Card",
    p2.selectedCard
    );

    updateDuelHp();
}

function renderSingleCard(id,card){

    let div =
    document.getElementById(id);

    if(!card){

        div.innerHTML =
        `
        <div class="card-name">
        No Card
        </div>
        `;

        return;
    }

    div.innerHTML =

    `
    <div class="card-name">
    ${card.name}
    </div>

    <div class="card-image">
    IMAGE
    </div>

    <div class="card-desc">
    ${card.description}
    </div>
    `;
}

function updateDuelHp(){

    document.getElementById("duelP1HpFill")
    .style.width =
    (p1.hp / 50) * 100 + "%";

    document.getElementById("duelP2HpFill")
    .style.width =
    (p2.hp / 50) * 100 + "%";

    document.getElementById("duelP1HpText")
    .innerHTML =
    `${p1.hp} / 50`;

    document.getElementById("duelP2HpText")
    .innerHTML =
    `${p2.hp} / 50`;
}

function startDuel(){

    applyTiming2();

    applyTiming3();

    applyTiming4();

    p1.hp -= p1.receivedDamage;
    p2.hp -= p2.receivedDamage;

    applyTiming5();

    if(p1.hp < 0) p1.hp = 0;
    if(p2.hp < 0) p2.hp = 0;

    updateDuelHp();

    showResultIfNeeded();

    document.getElementById("duelBtn")
    .innerHTML =
    "Done turn-ターン終了";

    document.getElementById("duelBtn")
    .onclick = ()=>{

        nextRound();
    };
}

/* =========================
勝敗
========================= */

function showResultIfNeeded(){

    if(p1.hp <= 0 && p2.hp <= 0){

        document.getElementById("duelP1Card")
        .innerHTML =
        `<div class="win-text">
        Drow-引き分け
        </div>`;

        document.getElementById("duelP2Card")
        .innerHTML =
        `<div class="win-text">
        Drow-引き分け
        </div>`;

        return;
    }

    if(p2.hp <= 0){

        document.getElementById("duelP1Card")
        .innerHTML =
        `<div class="win-text">
        Demination-制圧
        </div>`;

        document.getElementById("duelP2Card")
        .innerHTML =
        `<div class="win-text">
        Defeat-敗北
        </div>`;

        return;
    }

    if(p1.hp <= 0){

        document.getElementById("duelP1Card")
        .innerHTML =
        `<div class="win-text">
        Defeat-敗北
        </div>`;

        document.getElementById("duelP2Card")
        .innerHTML =
        `<div class="win-text">
        Demination-制圧
        </div>`;
    }
}

/* =========================
次ラウンド
========================= */

function nextRound(){

    if(p1.hp <= 0 || p2.hp <= 0){
        return;
    }

    currentTurn = 1;

    [p1,p2].forEach(player=>{

        player.dice1 = 0;
        player.dice2 = 0;

        player.extra = 0;

        player.damage = 0;

        player.role = "";

        player.cards = [];

        player.selectedCard = null;

        player.receivedDamage = 0;

        player.disposalMode = false;

        player.rerollTarget = null;
    });

    document.getElementById("duelScreen")
    .classList.add("hidden");

    document.getElementById("deployScreen")
    .classList.remove("hidden");

    resetDeployUI();

    updateUI();

    document.getElementById("duelBtn")
    .innerHTML = "Duel";

    document.getElementById("duelBtn")
    .onclick = startDuel;
}

/* =========================
開始
========================= */

updateUI();

</script>
